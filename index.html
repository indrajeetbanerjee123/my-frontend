<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#ff4d4d;
    color:white;
    padding:20px;
    text-align:center;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:40px;
    margin-bottom:15px;
}

.hero p{
    color:#555;
}

button{
    background:#ff4d4d;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    margin-top:20px;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:40px;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:250px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin-top:10px;
}

footer{
    text-align:center;
    padding:20px;
    background:#222;
    color:white;
}
</style>

</head>

<body>

<header>
<h2>🍔 FoodExpress</h2>
</header>

<section class="hero">
<h1>Delicious Food Delivered Fast</h1>
<p>Order your favorite meals online.</p>

<button onclick="orderFood()">
Order Now
</button>
</section>

<section class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500"
alt="Burger">

<h3>Cheese Burger</h3>
<p>₹199</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500"
alt="Pizza">

<h3>Pizza</h3>
<p>₹299</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500"
alt="Salad">

<h3>Healthy Salad</h3>
<p>₹149</p>
</div>

</section>

<footer>
<p>Hosted on AWS S3 + CloudFront</p>
</footer>

<script>
function orderFood(){
    alert("Order placed successfully!");
}
</script>

</body>
</html>
